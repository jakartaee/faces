<html lang="en"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:c="jakarta.tags.core"
>
    <h:head>
        <title>Spec1791</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:selectOneMenu id="selectItemArray">
                <f:selectItems value="#{spec1791Bean.selectItemArray}" />
            </h:selectOneMenu>
            <h:selectOneMenu id="selectItemArrayWithVar">
                <f:selectItems value="#{spec1791Bean.selectItemArray}" var="item" itemValue="#{item.value}" itemLabel="label: #{item.label}"/>
            </h:selectOneMenu>
            <h:selectOneMenu id="selectItemList">
                <f:selectItems value="#{spec1791Bean.selectItemList}" />
            </h:selectOneMenu>
            <h:selectOneMenu id="selectItemListWithVar">
                <f:selectItems value="#{spec1791Bean.selectItemList}" var="item" itemValue="#{item.value}" itemLabel="label: #{item.label}"/>
            </h:selectOneMenu>
            <h:selectOneMenu id="selectItemMap">
                <f:selectItems value="#{spec1791Bean.selectItemMap}" />
            </h:selectOneMenu>
            <h:selectOneMenu id="selectItemMapWithVar">
                <f:selectItems value="#{spec1791Bean.selectItemMap}" var="item" itemValue="#{item.value}" itemLabel="label: #{item.key}"/>
            </h:selectOneMenu>
        </h:form>
    </h:body>
</html>

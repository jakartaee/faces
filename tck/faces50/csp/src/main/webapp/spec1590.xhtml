<html lang="en"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
>
    <h:head>
        <title>spec1590</title>
    </h:head>
    <h:body>
        <h:form id="form1">
            <h:commandLink id="commandLink" value="commandLink" />
            <h:outputText id="commandLinkExecuted" value="#{not empty param['form1:commandLink']}" />
        </h:form>

        <h:form id="form2">
            <h:inputText id="ajaxInput" value="#{viewScope.ajaxInput}">
                <f:ajax render="ajaxOutput" />
            </h:inputText>
            <h:commandButton id="ajaxButton" value="ajaxButton">
                <f:ajax execute="@form" render="@form" />
            </h:commandButton>
            <h:outputText id="ajaxOutput" value="#{viewScope.ajaxInput}" />
        </h:form>

        <h:form id="form3">
            <h:commandScript id="commandScript" name="commandScript" render="@form" />
            <h:outputText id="commandScriptExecuted" value="#{param['jakarta.faces.source'] eq 'form3:commandScript'}" />
        </h:form>

        <h:form id="form4">
            <h:commandLink id="facesUtilChain" value="faces.util.chain" onclick="console.log('faces.util.chain')">
                <f:ajax render="@form" />
            </h:commandLink>
            <h:outputText id="facesUtilChainExecuted" value="#{param['jakarta.faces.source'] eq 'form4:facesUtilChain'}" />
        </h:form>

        <h:form id="form5">
            <h:button id="refreshButton" value="refreshButton" />
        </h:form>
    </h:body>
</html>

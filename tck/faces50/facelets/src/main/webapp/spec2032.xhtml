<html lang="en"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:pt="jakarta.faces.passthrough"
>
    <h:head>
        <title>spec2032</title>
    </h:head>
    <h:body>
        <h:dataTable id="table" value="#{['one','two','three']}" var="item">
            <f:facet name="header" pt:role="banner">
                header
            </f:facet>
            <h:column>
                <f:facet name="header" pt:class="icon-header" pt:style="color: green;" />
                <f:facet name="footer" pt:styleClass="my-footer" pt:style="font-size: 8px;">
                    footer
                </f:facet>
                #{item}1
            </h:column>
            <h:column>
                <f:facet name="header" pt:title="tooltip">
                    col2
                </f:facet>
                #{item}2
            </h:column>
        </h:dataTable>
    </h:body>
</html>

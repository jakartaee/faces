<!DOCTYPE html>

<html>
<f:view contentType="text/html"
	xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core"
	xmlns:ui="jakarta.faces.facelets"
	xmlns:cc="jakarta.faces.composite/issue2701">

    <h:head>
    </h:head>

    <h:body>
        <h:form id="form" >
            <h:commandButton id="ajax" value="Make an Ajax request">
                <f:ajax execute="form" render="form out"/>
            </h:commandButton>

            <br/>
            <br/>

            <cc:cc val="#{issue2701Bean.beanVal}"/>

            <br/>
            <br/>

            <cc:ccAttrRequired val="#{issue2701Bean.beanVal}"/>

            <br/>
            <br/>
   
            <h:outputText id="out" />

            <br/>
            <br/>
            
            <h:commandButton id="reset" value="reset" action="#{issue2701Bean.reset}"/>

        </h:form>
    </h:body>

</f:view>
</html>

<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">



    <h:head>
        <title>Redirect Happens During Ajax POSTback processing</title>
        <h:outputScript library="issue3348" name="issue3348.js" />
    </h:head>
    <h:body>
        <script>
            faces.ajax.addOnEvent(ajaxEvent);
        </script>
        
        
        <h:form prependId="false" id="form">
            
            <div id="responseText"></div>
            
            <h:commandButton id="button" value="submit" actionListener="#{issue3348Bean.causeRedirect}">
                <f:ajax />
            </h:commandButton>
            
        </h:form>
        
    </h:body>
</html>

<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">



    <h:head>
        <title>View Expiration 1</title>
    </h:head>
    <h:body>    
        <h:form id="form">
            State Saving Method: <h:outputText value="#{issue3101Bean.stateSavingMethod}"/>
            <h:commandButton id="expireSessionSoon" value="Expire Session Soon" actionListener="#{issue3101Bean.expireSessionSoon}">
                <f:ajax render="@all"/>
            </h:commandButton>
            <h:commandButton id="submit" value="Submit" actionListener="#{issue3101Bean.verifySession}">
                <f:ajax render="@all"/>
            </h:commandButton>
        </h:form>
        <script>
            function errorFunc(data) {
                document.getElementById("errorDiv").appendChild(document.createTextNode(data.errorName));
            }
        </script>
        <script>faces.ajax.addOnError(errorFunc);</script>
        <div id="errorDiv">
            
        </div>        
    </h:body>
</html>

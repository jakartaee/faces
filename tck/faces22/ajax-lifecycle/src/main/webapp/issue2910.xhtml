<!DOCTYPE html>
<html xmlns:c="jakarta.tags.core" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets">
<f:view >
    <h:head>
       <meta http-equiv="cache-control" content="no-cache" />
    </h:head>

    <h:body onload="">
    
       <h:form>
          <h:commandButton  action="#{issue2910Bean.chooseView(1)}" value="Back to 1" />
       </h:form>
    
       <h:form id="productBrowserForm">
          <ui:repeat value="#{issue2910Bean.currentView}" var="entry" varStatus="status">
              <h:commandLink action="#{issue2910Bean.chooseView(entry)}" value="#{entry}" >
                 <f:ajax execute="@form" render="@form" />
              </h:commandLink>
             <br/>
          </ui:repeat>
       
       </h:form>
    </h:body>
</f:view>
</html>

<html
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">



    <f:view locale="en">
        <h:head>
        </h:head>

        <h:body>
            <p><span id="exceptionDuringRender"/></p>
            <script>
                var handleError = function handleError(data) {
                    var errorMessageString = "Error from " + data.source.id;
                    var span = document.getElementById("exceptionDuringRender");
                    span.innerHTML = errorMessageString;
                };

                faces.ajax.addOnError(handleError);
            </script>
            <h:form id="form">
                <h:commandButton id="commandButton" value="throw on render in script">
                    <f:ajax listener="#{issue3477Bean.setRenderedScript(true)}" render="script"/>
                </h:commandButton>
            </h:form>
            <h:panelGroup id="script">
                <ui:fragment rendered="#{issue3477Bean.renderedScript}">
                    <script>
                        #{issue3477Bean.thrower}
                    </script>
                </ui:fragment>
            </h:panelGroup>
        </h:body>
    </f:view>
</html>

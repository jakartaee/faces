<!DOCTYPE html>
<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<f:view contentType="text/html"/>
<h:head>
    <title>Ajax</title>
</h:head>
<h:body>
    <h:form id="form1" prependId="false">
       <h:commandButton id="beforeButton" value="Insert Before" action="#{issue2756Bean.insertBefore}">
          <f:ajax execute="@this" render="alpha"/>
       </h:commandButton>
       <br/>
       <h:commandButton id="afterButton" value="Insert After" action="#{issue2756Bean.insertAfter}">
          <f:ajax execute="@this" render="alpha"/>
       </h:commandButton>
       <br/>
       <br/>
       <h:outputText id="alpha" value="alpha"/>
    </h:form>
</h:body>
</html>

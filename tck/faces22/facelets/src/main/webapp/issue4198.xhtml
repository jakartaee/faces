<!DOCTYPE html>
<html xmlns:h="jakarta.faces.html">
    <h:head>
        <title>Issue4198IT</title>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                document.getElementById("dynamicOnSubmitForm").addEventListener("submit", function() {
                    document.getElementById("dynamicOnSubmitForm:log").value = "dynamic onSubmit triggered";
                });
            });
        </script>
    </h:head>
    <h:body>
        <h:form id="staticOnSubmitForm" onsubmit="document.getElementById('staticOnSubmitForm:log').value = 'static onSubmit triggered'">
            <h:inputHidden id="log" value="#{issue4198Bean.log}" />
            <h:commandLink id="AAA" value="Link" />
            <h:commandButton id="BBB" value="Button" />
        </h:form>

        <h:form id="dynamicOnSubmitForm">
            <h:inputHidden id="log" value="#{issue4198Bean.log}" />
            <h:commandLink id="AAA" value="Link" />
            <h:commandButton id="BBB" value="Button" />
        </h:form>

        <h:outputText id="result" value="#{issue4198Bean.log}" />
    </h:body>
</html>

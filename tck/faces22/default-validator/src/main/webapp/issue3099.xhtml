<!DOCTYPE html>
<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:issue3099="jakarta.faces.composite/issue3099">
    <h:head>
        <title>Issue3099</title>
    </h:head>
    <h:body>
        <h:form id="form">
            Adding validators to editableValueHolders inside composite components:
            <issue3099:issue3099 id="myCompositeInput">
                <f:validator validatorId="ee.jakarta.tck.faces.faces22.default_validator.Issue3099Validator" for="input"/>
                <f:validateLength minimum="20" for="input"/>
            </issue3099:issue3099>

            <br/>
            Simple:
            <h:inputText id="simpleInput">
                <f:validator validatorId="ee.jakarta.tck.faces.faces22.default_validator.Issue3099Validator"/>
                <f:validateLength minimum="20"/>
            </h:inputText>

            <br/>
            <br/>
            <h:commandButton id="submit" value="Enter some short text, click me and watch the errors"/>
            <h:messages/>
        </h:form>
    </h:body>
</html>

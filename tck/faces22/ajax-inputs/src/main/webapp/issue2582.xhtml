<!DOCTYPE html>
<html
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      >
    <h:head>
        <title>Issue2582</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:panelGrid columns="2">
                <h:outputText value="Ajax Input:"/>
                <h:inputText id="input" value="#{issue2582Bean.text2}" />
                <h:commandButton id="fill" value="Fill" action="#{issue2582Bean.setText2('hello')}">
                    <f:ajax execute="@this" render="input" />
                </h:commandButton>    
            </h:panelGrid>            
            <h:panelGroup>
                <h:commandButton id="clear" value="Clear" actionListener="#{issue2582Bean.altClear}"
                                 immediate="true">
                    <f:ajax execute="@this" render="input"/>
                </h:commandButton>
            </h:panelGroup>
        </h:form>
    </h:body>
</html>

	xmlns:cc="jakarta.faces.composite/issue2412">

<f:view>
   <h:head>
   </h:head>
   <h:body>
       <h:form>
           <cc:compositeControl>
               <f:facet name="content">

                  <h:selectManyCheckbox value="#{issue2412Bean.sarray}">

                      <f:selectItem itemValue="mcheck-3" itemLabel="3"/>

                  </h:selectManyCheckbox>
                  After
                  <br/>
                  <h:outputText id="out" value="Status: #{issue2412Bean.string}"/>

          </cc:compositeControl>
       </h:form>
   </h:body>
</f:view>


</html>

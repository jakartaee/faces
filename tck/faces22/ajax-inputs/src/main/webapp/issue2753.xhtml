<!DOCTYPE html>
<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<f:view contentType="text/html"/>
<h:head>
    <title>Ajax</title>
</h:head>
<h:body>
             <script>
              var statusUpdate = function statusUpdate(data) {
                 var statusArea = document.getElementById("statusArea");
                 var text = statusArea.innerText;
                 text = text + "Name: "+data.source.id;
                 if (data.type === "event") {
                     text = text + " Response: "+data.responseText;
                 }
                 statusArea.innerText = text;
              }
            </script>
    <h:form id="form1">
       <h:commandButton id="button" value="Fire" action="#{updateBean.updateOnAsAttributeName}"> 
          <f:ajax onevent="statusUpdate"/>
       </h:commandButton>
       <br/>
       <br/>
       <br/>
       <h:commandButton id="button1" value="On"/>
       <br/>
       <br/>
       <br/>
       <h3> Status:</h3>
       <div id="statusArea"/>
    </h:form>
</h:body>
</html>

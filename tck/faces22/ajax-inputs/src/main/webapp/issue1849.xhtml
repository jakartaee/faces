<!DOCTYPE html>

<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:c="jakarta.tags.core">

    <f:view contentType="text/html">
        <f:metadata>
            <f:event type="preRenderView" listener="#{issue1849Bean.beginConversation}"/>
        </f:metadata>
        <h:head/>
        <h:body>
            <h:form id="myForm">
                <h:outputLabel value="Show Button" for="buttonCheckbox"/>
                <h:selectBooleanCheckbox id="buttonCheckbox" value="#{issue1849Bean.showButton}">
                    <f:ajax render="buttonGroup"/>
                </h:selectBooleanCheckbox>
                <h:panelGroup id="buttonGroup">
                    <c:if test="#{issue1849Bean.showButton}">
                        <h:commandButton id="clickme" value="Click Me" action="#{issue1849Bean.bar}">
                            <f:ajax render="buttonGroup"/>
                        </h:commandButton>
                    </c:if>
                </h:panelGroup>
                <h:commandButton id="reload" value="Reload"/>
            </h:form>
        </h:body>
    </f:view>
</html>

<html xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <!--
        Bound to the very same model property as the story view's view parameter, so that a redirect
        which includes the view parameters lands here with the selection intact and one which does
        not lands here without it.
    -->
    <f:metadata>
        <f:viewParam id="id" name="id" value="#{spec758NewsReader.selectedStoryId}" />
    </f:metadata>
    <h:head>
        <title>Spec758IT</title>
    </h:head>
    <h:body>
        <h:messages id="messages" />
        <h:outputText id="title" value="The big news stories of the day" />
        <ui:repeat var="story" value="#{spec758NewsReader.stories}">
            <h:link outcome="spec758-story" value="#{story.headline}">
                <f:param name="id" value="#{story.id}" />
            </h:link>
        </ui:repeat>
        <h:outputText id="selection" value="#{spec758NewsReader.selectedStoryId}" />
    </h:body>
</html>

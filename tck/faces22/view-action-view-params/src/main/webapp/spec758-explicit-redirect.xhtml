<html xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <f:metadata>
        <!--
            The matching navigation case declares a redirect back to this very view, so this view
            redirects to itself and never renders. Only ever request it without following redirects.
        -->
        <f:viewAction action="#{spec758Bean.explicitRedirect}" />
    </f:metadata>
    <h:head>
        <title>Spec758IT</title>
    </h:head>
    <h:body>
        <h:outputText id="page" value="Explicit redirect page" />
    </h:body>
</html>

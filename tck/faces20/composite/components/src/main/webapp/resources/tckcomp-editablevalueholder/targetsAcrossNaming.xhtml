<html
      xmlns:h="jakarta.faces.html"
      xmlns:composite="jakarta.faces.composite">
    <head>

        <title>Targets Across a Nested NamingContainer</title>

    </head>

    <body>

        <!--
            The 'targets' attribute, not the using page's 'for' attribute, carries the
            NamingContainer hierarchy: the h:form below is a NamingContainer, so the target is
            addressed as 'naming:lastname' while the using page attaches its listener to plain
            'name'.
        -->
        <composite:interface name="testPanel"
                             displayName="Test Panel"
                             preferred="true"
                             expert="false"
                             shortDescription="Targets an input nested in a NamingContainer!">

            <composite:editableValueHolder name="name" targets="naming:lastname"/>
        </composite:interface>

        <composite:implementation>

            <h:form id="naming">
                <h:outputText value="LastName: "/>
                <h:inputText id="lastname" value="#{cc.attrs.model.lastName}"/>

                <h:commandButton id="button" value="Button" />
            </h:form>

        </composite:implementation>

    </body>

</html>

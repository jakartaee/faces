<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:tck="jakarta.faces.composite/tckcomp-editablevalueholder">

    <h:head>
        <title>Composite:editableValueHolder Tag Test</title>
    </h:head>

    <h:body>

        <!-- Test Case 4. The composite brings its own form, so this page must not wrap it in one. -->
        <div id="compositeComponent">

            <tck:targetsAcrossNaming id="lname" model="#{lastname}">
                <f:valueChangeListener for="name"
                                       binding="#{lastname.valueChangeListener}" />
            </tck:targetsAcrossNaming>

            <p>Field Changed:
                <span id="caseFour">
                    <h:outputText value="#{changed}" />
                </span>
            </p>

        </div>

    </h:body>

</html>

<!--
    A Facelet that happens to live inside a resource library. Its source must never be delivered
    by the resource handler, because '.xhtml' is in ResourceHandler.RESOURCE_EXCLUDES_DEFAULT_VALUE.
    ResourceHandlerExIT#resourceHandlerExcludeXHTMLRuntimeTest asserts that neither of the markers
    below reaches the client.
-->
<html
      xmlns:h="jakarta.faces.html">

    <h:head>
        <title>Secret</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:commandButton id="submit" value="submit" />
        </h:form>
    </h:body>
</html>

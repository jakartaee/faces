<html
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

    <h:head>
        <title>Issue2213</title>
    </h:head>
    <h:body>

        <!-- offset as a ValueExpression -->
        <ui:repeat id="deferred" value="#{Color.colors}" var="color" offset="#{issue2213Bean.offset}">
            <h:outputText id="label" value="Color: #{color}" />
        </ui:repeat>

        <!-- the same offset as a literal, for contrast -->
        <ui:repeat id="literal" value="#{Color.colors}" var="color" offset="3">
            <h:outputText id="label" value="Color: #{color}" />
        </ui:repeat>

    </h:body>
</html>

<!DOCTYPE html>
<html xml:lang="en" lang="en"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:c="jakarta.tags.core"
      xmlns:fn="jakarta.tags.functions">
    <head>
        <title>JSTL function toUpperCase tag test</title>
    </head>

    <body>
        <c:set var="nullStr" value="#{commonBean.nullString}" scope="view" />
        
        <!-- Test Case 1 -->
        <h:outputText id="case1"
                      value="#{'UPPER' == fn:toUpperCase('uPpEr')}"/><br/>

        <!-- Test Case 2 -->
        <h:outputText id="case2"
                      value="#{'' == fn:toUpperCase(nullStr)}"/><br/>
    </body>
</html>

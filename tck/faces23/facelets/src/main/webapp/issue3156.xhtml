<html xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Issue3156</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:panelGroup id="date" layout="block">
                <h:outputText value="#{issue3156Bean.currentDate}"/>
            </h:panelGroup>

            <h:commandButton id="submit" value="Ajax!">
                <f:ajax execute="@this" render="date,messages"/>
            </h:commandButton>

            <!-- 'value' attr must NOT be evaluated per ajax call when not rendered -->
            <ui:repeat value="#{issue3156Bean.list1}" var="obj">
                <h:outputText value="#{obj}"/>
            </ui:repeat>

            <!-- no evaluation happens here -->
            <h:dataTable value="#{issue3156Bean.list2}" var="obj">
                <h:column>
                    <h:outputText value="#{obj}"/>
                </h:column>
            </h:dataTable>

            <h:panelGroup id="messages">
                <h:messages/>
            </h:panelGroup>
        </h:form>
    </h:body>
</html>

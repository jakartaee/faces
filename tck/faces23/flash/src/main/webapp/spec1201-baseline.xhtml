    jar; whatever cookie appears afterwards on spec1201.xhtml is therefore the flash cookie, whose
    implementation-specific name the test must not assume.
-->

      xmlns:h="jakarta.faces.html">

    <h:head>
        <title>Spec1201IT - Baseline without flash</title>
    </h:head>
    <h:body>
        <h:form id="form">
            <h:commandButton id="next" value="Next" action="spec1201-page2"/>
        </h:form>
    </h:body>
</html>

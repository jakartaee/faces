<!DOCTYPE html>
<html
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

    <h:head>
        <title>Issue4086</title>

        <h:outputStylesheet library="default" name="css/rafa.css"/>
        <h:outputScript library="default" name="rafa.js"/>
    </h:head>
    <h:body>
        <f:view locale="#{issue4086Bean.mylocale}">
            <div>
                <h:form id="atp">
                    <h:commandButton id="rg" value="Rafa at Roland Garros" action="#{issue4086Bean.changeMyLocale('fr')}"/>
                    <h:commandButton id="wo" value="Rafa at Wimbledon" action="#{issue4086Bean.changeMyLocale('en')}"/>
                    <h:commandButton id="us" value="Rafa at US Open" action="#{issue4086Bean.changeMyLocale('us')}"/>
                    <h:commandButton id="au" value="Rafa at Australian Open" action="#{issue4086Bean.changeMyLocale('au')}"/>
                </h:form>
            </div>
            <div>
                <h:graphicImage library="default" name="img/rafa.png"/>
            </div>
        </f:view>
    </h:body>
</html>

<html xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:jsf="jakarta.faces">
    <h:head>
        <title>Spec1111 select</title>
    </h:head>
    <h:body>
        <form jsf:id="form">
            <p>
                <select jsf:id="selectOne" size="1" jsf:value="#{spec1111Bean.selectOne}">
                    <f:selectItems value="#{spec1111Bean.list}" />
                </select>
            </p>
            <p>
                <select jsf:id="selectOneSize2" size="2" jsf:value="#{spec1111Bean.selectOneSize2}">
                    <f:selectItems value="#{spec1111Bean.list}" />
                </select>
            </p>
            <p>
                <!-- No size attribute: the listbox renderer must default it to the number of select items. -->
                <select jsf:id="selectMany" multiple="multiple" jsf:value="#{spec1111Bean.selectMany}">
                    <f:selectItems value="#{spec1111Bean.list}" />
                </select>
            </p>
            <input jsf:id="submit" type="submit" value="submit" />
        </form>
    </h:body>
</html>

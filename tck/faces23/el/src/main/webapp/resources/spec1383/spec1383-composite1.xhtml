<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:cc="jakarta.faces.composite"
                xmlns:h="jakarta.faces.html"
                xmlns:spec1383="jakarta.faces.composite/spec1383">

    <cc:interface>
        <cc:attribute name="parameter" type="java.lang.String" />
    </cc:interface>

    <cc:implementation>
        clientID1:#{cc.clientId}
        Parameter1:#{cc.attrs.parameter}
        <br/>

        <!-- Nest a composite component to test that "cc" changes correctly within the inner component. -->
        <spec1383:spec1383-composite2 id="componentA" parameter="testA"/>
        <br/>

        <!-- Print ID and parameter again to test it changes correctly back when scope changes back to outer component. -->
        clientID1:#{cc.clientId}
        Parameter1:#{cc.attrs.parameter}
    </cc:implementation>

</ui:composition>
